url: "https://casualxeno.github.io"
baseurl: "/blog"
lang: en
timezone: Asia/Almaty

theme: jekyll-theme-chirpy

title: Denis Xenofontov
email: xeno120503@gmail.com
description: >-
  This is a repository of my thoughts and ideas that I've collected over the years.
  This also helps me practice English.

github:
  username: casualxeno

social:
  name: "Denis Xenofontov"
  email: "xeno120503@gmail.com"
  links:
    - https://github.com/casualxeno
    - https://twitter.com/casualxeno
    - https://instagram.com/this.is.xeno

theme_mode: 'dark'
avatar: "/assets/img/me.jpeg"

toc: true

actions:
  edit_post:
    enabled: false
    url: ""
    static_url: false

comments:
  provider: utterances
  utterances:
    repo: casualxeno/blog
    issue_term: 'pathname'

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10

plugins:
  - jekyll-feed
  - jekyll-paginate

paginate: 10
paginate_path: "/page:num/"

page_license:
  type: false


# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts: # Rouge Options › https://github.com/jneen/rouge#full-options
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" # An empty string here means all files in the project
      type: posts
    values:
      layout: post
      comments: true # Enable comments in posts.
      toc: true # Display TOC column in posts.
      # DO NOT modify the following parameter unless you are confident enough
      # to update the code of all other post links in this project.
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs # see `site.collections`
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
